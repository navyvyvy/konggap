name: Refresh offers

on:
  schedule:
    - cron: "0 1,5,9,17 * * *" # 10:00, 14:00, 18:00, 02:00 KST
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: refresh-offers
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: node scripts/crawl-green-beans.mjs "생두"
      - run: |
          mkdir -p public/data
          cp data/latest-offers.json data/coffee-info.json public/data/
      - run: rm -rf app/api
      - run: npm run build
        env:
          GITHUB_PAGES: "1"
          NEXT_PUBLIC_STATIC_EXPORT: "1"

      - uses: actions/upload-pages-artifact@v4
        with:
          path: out

      - id: deployment
        uses: actions/deploy-pages@v4
