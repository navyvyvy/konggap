name: Refresh offers

on:
  schedule:
    - cron: "0 1,5,9,17 * * *" # 10:00, 14:00, 18:00, 02:00 KST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-offers
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: node scripts/crawl-green-beans.mjs "생두"

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/latest-offers.json data/coffee-info.json
          git diff --cached --quiet || git commit -m "data: refresh offers"
          git push
