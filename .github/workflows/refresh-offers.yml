name: Refresh offers

on:
  schedule:
    - cron: "0 1,5,9,17 * * *" # 10:00, 14:00, 18:00, 02:00 KST
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: refresh-offers
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Restore current snapshots
        run: |
          mkdir -p data
          curl -fsSL https://navyvyvy.github.io/konggap/data/latest-offers.json -o data/latest-offers.json || true
          curl -fsSL https://navyvyvy.github.io/konggap/data/latest-offers-whole.json -o data/latest-offers-whole.json || true
          curl -fsSL https://navyvyvy.github.io/konggap/data/coffee-info.json -o data/coffee-info.json || true
          curl -fsSL https://navyvyvy.github.io/konggap/data/shop-sources.json -o data/previous-shop-sources.json || true
      - run: node scripts/crawl-mungstery-beans.mjs
      - run: node scripts/discover-shop-sources.mjs --restore=previous-shop-sources.json
      - run: node scripts/crawl-green-beans.mjs "생두"
      - run: node scripts/crawl-green-beans.mjs "원두"
      - run: |
          mkdir -p public/data
          cp data/latest-offers.json data/latest-offers-whole.json data/coffee-info.json data/mungstery-beans.json data/shop-sources.json public/data/
      - run: rm -rf app/api

      - name: Deploy to Vercel
        run: |
          npx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx vercel@latest build --prod --token="$VERCEL_TOKEN"
          npx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_STATIC_EXPORT: "1"

      - run: npm run build
        env:
          GITHUB_PAGES: "1"
          NEXT_PUBLIC_STATIC_EXPORT: "1"

      - uses: actions/upload-pages-artifact@v5
        with:
          path: out

      - id: deployment
        uses: actions/deploy-pages@v5
